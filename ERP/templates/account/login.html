<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Your App</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== 3D BUBBLE BACKGROUND (same as signup) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0a1929 0%, #2d5788 100%);
            position: relative;
            overflow-x: hidden;
            padding: 1rem;
        }
        /* 3D Bubbles */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.3), 0 15px 25px rgba(0, 0, 0, 0.1);
            animation: float 8s infinite ease-in-out;
            z-index: 0;
        }
        .bubble1 {
            width: 250px;
            height: 250px;
            top: -50px;
            left: -80px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.05));
            animation-duration: 12s;
        }
        .bubble2 {
            width: 350px;
            height: 350px;
            bottom: -100px;
            right: -100px;
            background: radial-gradient(circle at 70% 30%, rgba(255, 215, 245, 0.3), rgba(255, 255, 255, 0.02));
            animation-duration: 16s;
            animation-delay: -3s;
        }
        .bubble3 {
            width: 180px;
            height: 180px;
            top: 40%;
            right: 15%;
            background: radial-gradient(circle at 20% 20%, rgba(255, 220, 240, 0.4), rgba(255, 255, 255, 0.03));
            animation-duration: 10s;
            animation-delay: -1s;
        }
        .bubble4 {
            width: 220px;
            height: 220px;
            bottom: 15%;
            left: 5%;
            background: radial-gradient(circle at 40% 60%, rgba(255, 200, 230, 0.35), rgba(255, 255, 255, 0.02));
            animation-duration: 14s;
        }
        .bubble5 {
            width: 120px;
            height: 120px;
            top: 20%;
            left: 20%;
            background: radial-gradient(circle at 60% 20%, rgba(255, 240, 250, 0.5), rgba(255, 255, 255, 0.05));
            animation-duration: 7s;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(3deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Auth Card */
        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            z-index: 10;
            position: relative;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.25s ease;
        }
        .auth-card:hover {
            transform: translateY(-6px);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h3 {
            font-weight: 700;
            color: #0a2844;
            margin-bottom: 0.5rem;
            font-size: 1.9rem;
            letter-spacing: -0.5px;
        }
        .auth-header p {
            color: #3c6374;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1e485c;
            font-size: 0.9rem;
            letter-spacing: 0.2px;
        }
        .form-group label i {
            color: #5eb6e5;
            width: 22px;
            margin-right: 6px;
        }
        .form-control {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border: 2px solid #c2e3f0;
            border-radius: 30px;
            font-size: 1rem;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.8);
        }
        .form-control:focus {
            border-color: #5ec1e5;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(165, 94, 229, 0.15);
            outline: none;
        }
        .form-check {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .form-check-input {
            width: 1.2rem;
            height: 1.2rem;
            border-radius: 6px;
            border: 2px solid #b0cae0;
        }
        .form-check-input:checked {
            background-color: #5e9de5;
            border-color: #5e9de5;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #644ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 1rem;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(63, 133, 179, 0.4);
            margin-top: 1rem;
            cursor: pointer;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 30px rgba(138, 63, 179, 0.5);
            background: linear-gradient(135deg, #418ac5 0%, #614ac9 100%);
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: #3c5e74;
            font-weight: 500;
        }
        .auth-footer a {
            color: #3d61a3;
            font-weight: 700;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .divider {
            display: flex;
            align-items: center;
            color: #809ab3;
            margin: 1.8rem 0;
        }
        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #c2d7f0;
        }
        .divider span {
            padding: 0 1rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .social-login {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .social-btn {
            background: white;
            border: 2px solid #d9c2f0;
            border-radius: 40px;
            padding: 0.7rem 1.5rem;
            color: #265170;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .social-btn:hover {
            background: #e9faff;
            border-color: #88c5e0;
        }
        .alert {
            border-radius: 30px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.8rem;
            border: none;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.9);
        }
        .alert-success {
            background: #e5d4fa;
            color: #134661;
        }
        .alert-danger {
            background: #ffdede;
            color: #a12b2b;
        }
        .alert i {
            margin-right: 8px;
        }
        /* (Optional) Password hint style – not used on login but kept for consistency */
        .password-hint {
            font-size: 0.8rem;
            color: #587aa0;
            margin-top: 0.3rem;
            padding-left: 0.5rem;
            font-weight: 500;
        }
        .password-hint i {
            color: #5eade5;
            font-size: 0.6rem;
            margin-right: 0.3rem;
        }
    </style>
</head>
<body>
    <!-- 3D Bubbles -->
    <div class="bubble bubble1"></div>
    <div class="bubble bubble2"></div>
    <div class="bubble bubble3"></div>
    <div class="bubble bubble4"></div>
    <div class="bubble bubble5"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h3>Welcome back</h3>
                <p>Sign in to your account</p>
            </div>

            <!-- Flash messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            <i class="fas fa-{{ 'check-circle' if category == 'success' else 'exclamation-circle' }}"></i>
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('account.login_post') }}">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" class="form-control" name="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember" name="remember">
                        <label class="form-check-label" for="remember">Remember me</label>
                    </div>
                    <!-- Forgot password link removed (prevents BuildError) -->
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

           

            <div class="auth-footer">
                Don't have an account? <a href="{{ url_for('account.signup') }}">Sign up</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
